<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decision Tree · EV Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0a; overflow: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  #app { display: flex; height: 100vh; font-family: 'Cormorant Garamond', serif; }

  /* SIDEBAR */
  #sidebar {
    width: 280px; background: #0f0f0f; border-right: 1px solid #1e1e1e;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  #sidebar-header {
    padding: 28px 24px 20px; border-bottom: 1px solid #1a1a1a;
  }
  #sidebar-header h1 {
    font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300;
    color: #e8e8e0; letter-spacing: 0.04em;
  }
  #sidebar-header p {
    font-family: 'DM Mono', monospace; font-size: 10px; color: #3a3a3a;
    letter-spacing: 0.1em; margin-top: 4px; text-transform: uppercase;
  }
  #properties { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .prop-label {
    font-family: 'DM Mono', monospace; font-size: 10px; color: #555;
    letter-spacing: 0.08em; text-transform: uppercase; display: block;
    margin-bottom: 4px; margin-top: 16px;
  }
  .prop-label:first-child { margin-top: 0; }
  .prop-input {
    background: transparent; border: none; border-bottom: 1px solid #333;
    color: #e8e8e0; font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 4px 0; width: 100%; outline: none; transition: border-color 0.2s;
  }
  .prop-input:focus { border-bottom-color: #e8e8e0; }
  .prop-input::placeholder { color: #444; }
  .prop-subtitle {
    font-family: 'Cormorant Garamond', serif; font-size: 13px; color: #888;
    letter-spacing: 0.06em; margin-bottom: 16px; font-style: italic;
  }
  .type-btns { display: flex; gap: 8px; margin-bottom: 8px; }
  .type-btn {
    flex: 1; padding: 6px 0; background: transparent;
    border: 1px solid #2a2a2a; color: #555;
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .type-btn.active { background: #e8e8e0; border-color: #e8e8e0; color: #0a0a0a; }
  .type-btn.disabled { opacity: 0.25; cursor: not-allowed; }
  .ev-inherited { margin-top: 4px; padding: 6px 0; border-bottom: 1px solid #1e1e1e; display: flex; align-items: baseline; gap: 10px; }
  .ev-inherited-val { font-family: 'DM Mono', monospace; font-size: 13px; color: #e8e8e0; }
  .ev-inherited-note { font-family: 'DM Mono', monospace; font-size: 9px; color: #3a3a3a; text-transform: uppercase; letter-spacing: 0.06em; font-style: italic; }
  .ev-badge {
    margin-top: 16px; padding: 10px 12px; background: #141414;
    border: 1px solid #222; font-family: 'DM Mono', monospace; font-size: 11px; color: #aaa;
  }
  .ev-badge-label { color: #555; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; }
  .ev-badge-val { color: #e8e8e0; font-size: 14px; margin-top: 2px; }
  .empty-msg {
    color: #333; font-family: 'Cormorant Garamond', serif; font-size: 15px;
    font-style: italic; text-align: center; margin-top: 40px;
  }

  /* SIDEBAR ACTIONS */
  #actions { padding: 16px 24px; border-top: 1px solid #1a1a1a; display: flex; flex-direction: column; gap: 8px; }
  .btn {
    padding: 9px 12px; cursor: pointer; font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    transition: all 0.15s; width: 100%; border: none;
  }
  .btn-add { background: #1a1a1a; color: #e8e8e0; }
  .btn-add:hover { background: #252525; }
  .btn-delete { background: transparent; color: #8b3a3a; border: 1px solid #3a1a1a !important; }
  .btn-delete:hover { background: #1a0a0a; }
  .btn-calc { background: #e8e8e0; color: #0a0a0a; font-weight: 500; margin-top: 4px; }
  .btn-calc:hover { background: #ffffff; }
  #ev-result {
    margin-top: 8px; padding: 14px 16px; background: #0f0f0f;
    border: 1px solid #2a2a2a; text-align: center; display: none;
  }
  #ev-result-label {
    font-family: 'DM Mono', monospace; font-size: 9px; color: #555;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  #ev-result-val {
    font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300;
    color: #e8e8e0; margin-top: 4px; letter-spacing: 0.02em;
  }

  /* CANVAS */
  #canvas-wrap { flex: 1; position: relative; overflow: hidden; background: #0a0a0a; }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: default; }

  /* LEGEND */
  #legend {
    position: absolute; bottom: 24px; right: 24px;
    background: #0f0f0f; border: 1px solid #1a1a1a; padding: 14px 18px;
  }
  #legend-title {
    font-family: 'DM Mono', monospace; font-size: 9px; color: #333;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .legend-shape { font-family: 'DM Mono', monospace; font-size: 12px; color: #555; width: 16px; }
  .legend-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.06em; }
  #legend-tip {
    margin-top: 10px; padding-top: 10px; border-top: 1px solid #1a1a1a;
    font-family: 'DM Mono', monospace; font-size: 9px; color: #333; line-height: 1.8;
  }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Decision Tree</h1>
      <p>EV Calculator</p>
    </div>
    <div id="properties">
      <div class="empty-msg">Select a node or branch</div>
    </div>
    <div id="actions">
      <button class="btn btn-add" id="btn-add" style="display:none" onclick="addChild()">+ Add Branch</button>
      <button class="btn btn-delete" id="btn-delete" style="display:none" onclick="deleteSelected()">Delete Selected</button>
      <button class="btn btn-calc" onclick="calculateEV()">Calculate EV</button>
      <div id="ev-result">
        <div id="ev-result-label">Tree Expected Value</div>
        <div id="ev-result-val">—</div>
      </div>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <svg id="canvas" onclick="deselectAll()">
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#141414" stroke-width="0.5"/>
        </pattern>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#2a2a2a"/>
        </marker>
        <marker id="arrow-sel" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#e8e8e0"/>
        </marker>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)" pointer-events="none"/>
      <g id="branches-layer"></g>
      <g id="nodes-layer"></g>
    </svg>
    <div id="legend">
      <div id="legend-title">Legend</div>
      <div class="legend-row"><span class="legend-shape">●</span><span class="legend-lbl">Decision Node</span></div>
      <div class="legend-row"><span class="legend-shape">◆</span><span class="legend-lbl">Chance Node</span></div>
      <div class="legend-row"><span class="legend-shape">▬</span><span class="legend-lbl">Outcome Node</span></div>
      <div id="legend-tip">Click to select<br>Drag to move<br>Click branch to edit</div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 8);

let nodes = {
  root: { id: 'root', label: 'Decision', x: 500, y: 100, type: 'decision', ev: '' }
};
let branches = {};
let selected = null;   // id of selected node or branch
let evMap = {};

// ── Drag state ─────────────────────────────────────────────────────────────
let dragging = null;
let dragOffX = 0, dragOffY = 0;

// ── Helpers ────────────────────────────────────────────────────────────────
function isNode(id) { return !!nodes[id]; }
function isBranch(id) { return !!branches[id]; }

function computeEV(nodeId) {
  // Convention B: branches carry probability only; payoffs live on outcome (leaf) nodes.
  // EV of a node = Σ p_i * EV(child_i)   for internal nodes
  // EV of a leaf = its terminal value
  const outgoing = Object.values(branches).filter(b => b.from === nodeId);
  if (outgoing.length === 0) {
    const n = nodes[nodeId];
    return n && n.ev !== '' ? parseFloat(n.ev) || 0 : 0;
  }
  let ev = 0;
  for (const b of outgoing) {
    const p = parseFloat(b.probability) || 0;
    ev += p * computeEV(b.to);
  }
  return ev;
}

function descendants(nodeId) {
  const children = Object.values(branches).filter(b => b.from === nodeId).map(b => b.to);
  let all = [...children];
  for (const c of children) all = [...all, ...descendants(c)];
  return all;
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  renderBranches();
  renderNodes();
  renderSidebar();
}

function renderBranches() {
  const layer = document.getElementById('branches-layer');
  layer.innerHTML = '';
  for (const b of Object.values(branches)) {
    const from = nodes[b.from], to = nodes[b.to];
    if (!from || !to) continue;
    const sel = selected === b.id;
    const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;

    const g = svgEl('g');

    // Line
    const line = svgEl('line', {
      x1: from.x, y1: from.y + 22, x2: to.x, y2: to.y - 24,
      stroke: sel ? '#e8e8e0' : '#2a2a2a',
      'stroke-width': sel ? 1.5 : 1,
      'marker-end': sel ? 'url(#arrow-sel)' : 'url(#arrow)'
    });
    g.appendChild(line);

    // Hit area
    const hit = svgEl('line', {
      x1: from.x, y1: from.y + 22, x2: to.x, y2: to.y - 24,
      stroke: 'transparent', 'stroke-width': 16, style: 'cursor:pointer'
    });
    hit.addEventListener('click', e => { e.stopPropagation(); selectItem(b.id); });
    g.appendChild(hit);

    // Label card
    const card = svgEl('g', { style: 'cursor:pointer' });
    card.addEventListener('click', e => { e.stopPropagation(); selectItem(b.id); });

    card.appendChild(svgEl('rect', {
      x: mx - 46, y: my - 18, width: 92, height: 32, rx: 2,
      fill: '#0f0f0f', stroke: sel ? '#333' : '#1a1a1a'
    }));

    const t1 = svgEl('text', { x: mx, y: my - 5, 'text-anchor': 'middle',
      fill: sel ? '#e8e8e0' : '#666',
      style: "font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.06em" });
    t1.textContent = (b.label || 'branch').slice(0, 14);
    card.appendChild(t1);

    const t2 = svgEl('text', { x: mx, y: my + 8, 'text-anchor': 'middle',
      fill: '#4a7a4a', style: "font-family:'DM Mono',monospace;font-size:9px" });
    t2.textContent = 'p=' + (b.probability !== '' ? b.probability : '–');
    card.appendChild(t2);

    g.appendChild(card);
    layer.appendChild(g);
  }
}

function renderNodes() {
  const layer = document.getElementById('nodes-layer');
  layer.innerHTML = '';
  for (const n of Object.values(nodes)) {
    const sel = selected === n.id;
    const g = svgEl('g', { transform: `translate(${n.x},${n.y})`, style: 'cursor:grab' });
    g.addEventListener('mousedown', e => startDrag(e, n.id));
    g.addEventListener('click', e => { e.stopPropagation(); selectItem(n.id); });

    const glow = sel ? 'drop-shadow(0 0 8px rgba(232,232,224,0.3))' : 'none';
    const fill = sel ? '#e8e8e0' : '#141414';
    const stroke = sel ? '#e8e8e0' : '#2a2a2a';

    if (n.type === 'decision') {
      g.appendChild(svgEl('circle', { cx: 0, cy: 0, r: 22, fill, stroke, 'stroke-width': sel ? 0 : 1, style: `transition:all .15s;filter:${glow}` }));
    } else if (n.type === 'chance') {
      g.appendChild(svgEl('polygon', { points: '0,-26 26,0 0,26 -26,0', fill, stroke, 'stroke-width': sel ? 0 : 1, style: `transition:all .15s;filter:${glow}` }));
    } else {
      g.appendChild(svgEl('rect', { x: -24, y: -18, width: 48, height: 36, rx: 3, fill, stroke, 'stroke-width': sel ? 0 : 1, style: `transition:all .15s;filter:${glow}` }));
    }

    const label = svgEl('text', { x: 0, y: 1, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
      fill: sel ? '#0a0a0a' : '#e8e8e0',
      style: "font-family:'Cormorant Garamond',serif;font-size:11px;pointer-events:none;user-select:none" });
    label.textContent = n.label.length > 10 ? n.label.slice(0, 10) + '…' : n.label;
    g.appendChild(label);

    if (evMap[n.id] !== undefined) {
      const evT = svgEl('text', { x: 0, y: n.type === 'outcome' ? 30 : 36, 'text-anchor': 'middle',
        fill: '#5a8a5a', style: "font-family:'DM Mono',monospace;font-size:9px;pointer-events:none" });
      evT.textContent = evMap[n.id].toFixed(3);
      g.appendChild(evT);
    }

    layer.appendChild(g);
  }
}

function renderSidebar() {
  const props = document.getElementById('properties');
  const btnAdd = document.getElementById('btn-add');
  const btnDel = document.getElementById('btn-delete');

  if (selected && isNode(selected)) {
    const n = nodes[selected];
    btnAdd.style.display = '';
    btnDel.style.display = selected === 'root' ? 'none' : '';
    props.innerHTML = `
      <div class="prop-subtitle">${n.id === 'root' ? 'Root Node' : 'Node'}</div>
      <label class="prop-label">Label</label>
      <input class="prop-input" id="p-label" value="${esc(n.label)}" placeholder="Node label…" />
      <label class="prop-label">Type</label>
      <div class="type-btns">
        ${['decision','chance','outcome'].map(t => {
          const isRoot = n.id === 'root';
          const hasChildren = Object.values(branches).some(b => b.from === n.id);
          // Root can only be decision; nodes with children cannot be outcome
          const disabled = (isRoot && t !== 'decision') || (hasChildren && t === 'outcome');
          const title = isRoot && t !== 'decision' ? 'Root must be a decision node'
                      : hasChildren && t === 'outcome' ? 'Cannot set to outcome: node has children'
                      : '';
          return `<button class="type-btn ${n.type===t?'active':''} ${disabled?'disabled':''}"
            ${disabled ? 'disabled' : `onclick="setNodeType('${t}')"`}
            title="${title}">${t}</button>`;
        }).join('')}
      </div>
      ${n.type === 'outcome' ? `
        <label class="prop-label">Terminal Value</label>
        <input class="prop-input" id="p-ev" type="number" value="${n.ev}" placeholder="0.00" />
      ` : ''}
      ${evMap[n.id] !== undefined ? `
        <div class="ev-badge">
          <div class="ev-badge-label">Subtree EV</div>
          <div class="ev-badge-val">${evMap[n.id].toFixed(4)}</div>
        </div>
      ` : ''}
    `;
    document.getElementById('p-label')?.addEventListener('input', e => {
      nodes[selected].label = e.target.value; renderNodes();
    });
    // p-ev only exists for outcome nodes with no incoming branch
    document.getElementById('p-ev')?.addEventListener('input', e => {
      nodes[selected].ev = e.target.value;
    });

  } else if (selected && isBranch(selected)) {
    const b = branches[selected];
    btnAdd.style.display = 'none';
    btnDel.style.display = '';
    props.innerHTML = `
      <div class="prop-subtitle">Branch</div>
      <label class="prop-label">Label</label>
      <input class="prop-input" id="p-label" value="${esc(b.label)}" placeholder="Branch label…" />
      <label class="prop-label">Probability (0–1)</label>
      <input class="prop-input" id="p-prob" type="number" min="0" max="1" step="0.01" value="${b.probability}" placeholder="0.50" />
    `;
    document.getElementById('p-label')?.addEventListener('input', e => {
      branches[selected].label = e.target.value; renderBranches();
    });
    document.getElementById('p-prob')?.addEventListener('input', e => {
      branches[selected].probability = e.target.value; renderBranches();
    });

  } else {
    btnAdd.style.display = 'none';
    btnDel.style.display = 'none';
    props.innerHTML = '<div class="empty-msg">Select a node or branch</div>';
  }
}

// ── Actions ────────────────────────────────────────────────────────────────
function selectItem(id) {
  selected = id;
  render();
}

function deselectAll() {
  selected = null;
  render();
}

function addChild() {
  if (!selected || !isNode(selected)) return;
  const parent = nodes[selected];
  const siblings = Object.values(branches).filter(b => b.from === selected);
  const newNodeId = uid(), newBranchId = uid();
  const offsetX = (siblings.length - Math.floor(siblings.length / 2)) * 170;
  nodes[newNodeId] = { id: newNodeId, label: 'Outcome', type: 'outcome', x: parent.x + offsetX, y: parent.y + 170, ev: '' };
  branches[newBranchId] = { id: newBranchId, from: selected, to: newNodeId, label: 'Branch', probability: '', value: '' };
  selected = newBranchId;
  render();
}

function deleteSelected() {
  if (!selected || selected === 'root') return;
  if (isNode(selected)) {
    const desc = descendants(selected);
    const toRemoveNodes = [selected, ...desc];
    const toRemoveBranches = Object.values(branches)
      .filter(b => toRemoveNodes.includes(b.from) || toRemoveNodes.includes(b.to))
      .map(b => b.id);
    toRemoveNodes.forEach(id => delete nodes[id]);
    toRemoveBranches.forEach(id => delete branches[id]);
  } else if (isBranch(selected)) {
    const b = branches[selected];
    const desc = descendants(b.to);
    const toRemoveNodes = [b.to, ...desc];
    const toRemoveBranches = Object.values(branches)
      .filter(br => br.id === selected || toRemoveNodes.includes(br.from) || toRemoveNodes.includes(br.to))
      .map(br => br.id);
    toRemoveNodes.forEach(id => delete nodes[id]);
    toRemoveBranches.forEach(id => delete branches[id]);
  }
  selected = 'root';
  evMap = {};
  document.getElementById('ev-result').style.display = 'none';
  render();
}

function setNodeType(type) {
  if (!selected || !isNode(selected)) return;
  const n = nodes[selected];
  // Root must stay as decision
  if (n.id === 'root' && type !== 'decision') return;
  // Nodes with children cannot become outcome nodes
  const hasChildren = Object.values(branches).some(b => b.from === n.id);
  if (hasChildren && type === 'outcome') return;
  n.type = type;
  if (type !== 'outcome') n.ev = '';
  render();
}

function calculateEV() {
  evMap = {};
  for (const id of Object.keys(nodes)) evMap[id] = computeEV(id);
  const rootEV = evMap['root'];
  const res = document.getElementById('ev-result');
  res.style.display = '';
  document.getElementById('ev-result-val').textContent = rootEV.toFixed(4);
  render();
}

// ── Drag ───────────────────────────────────────────────────────────────────
function startDrag(e, nodeId) {
  e.stopPropagation();
  selected = nodeId;
  dragging = nodeId;
  const rect = document.getElementById('canvas').getBoundingClientRect();
  dragOffX = e.clientX - rect.left - nodes[nodeId].x;
  dragOffY = e.clientY - rect.top - nodes[nodeId].y;
  renderSidebar();
}

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const rect = document.getElementById('canvas').getBoundingClientRect();
  nodes[dragging].x = e.clientX - rect.left - dragOffX;
  nodes[dragging].y = e.clientY - rect.top - dragOffY;
  renderBranches();
  renderNodes();
});

document.addEventListener('mouseup', () => { dragging = null; });

// ── SVG helper ─────────────────────────────────────────────────────────────
function svgEl(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

// ── Init ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
